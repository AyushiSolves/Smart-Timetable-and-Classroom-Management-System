<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Timetable System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-container">
    <div style="font-size: 3.5rem; color: var(--primary); margin-bottom: 0.5rem;">
        <i class='bx bxs-graduation'></i>
    </div>
    <h2>Smart Timetable</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">Sign in to access your academic portal.</p>

    <input type="text" id="username" class="form-control" placeholder="Enter Username (e.g., teacher1)">
    <input type="password" id="password" class="form-control" placeholder="Enter Password (e.g., 123)">
    
    <button class="btn btn-primary" onclick="login()">Sign In</button>

    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); font-size: 0.85rem; color: var(--text-muted); text-align: left;">
        <p style="margin-bottom: 0.5rem;"><strong>Demo Credentials:</strong></p>
        <p>Teacher: <code>teacher1</code> / <code>123</code></p>
        <p>Student: <code>student1</code> / <code>123</code></p>
    </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
